<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Oracle</title>
<style>
  :root { color-scheme: dark; }
  html, body, #root { height: 100%; margin: 0; background: #000; }
  body {
    font: 12px/1.4 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #e8e8ee;
    overflow: hidden;
    cursor: none;
  }
  .twk-panel, .twk-panel * { cursor: auto !important; }
  .twk-panel input, .twk-panel button, .twk-panel select { cursor: pointer !important; }
  .twk-panel .twk-hd { cursor: grab !important; }

  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at center, rgba(72,202,228,0.04), transparent 60%),
      #000;
  }

  /* ── Crystal ball ── */
  .ball-wrap {
    position: relative;
    width: 70vmin; height: 70vmin;
    -webkit-tap-highlight-color: transparent;
    z-index: 2;
  }
  .ball-clip {
    position: absolute; inset: 0;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--glow-soft, rgba(72, 202, 228, 0.35));
    transition: border-color .6s ease;
    background: radial-gradient(circle, rgba(20,20,28,0.6), rgba(0,0,0,1) 75%);
  }
  .ball-clip canvas.vision {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transition: opacity 220ms linear;
    filter: url(#fisheye);
  }
  .ball-clip canvas.vision.no-distort { filter: none; }
  .ball-clip canvas.vision.crystallize {
    animation: crystallize 1.6s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes crystallize {
    0%   { opacity: 0; transform: scale(0.5); filter: blur(40px); }
    50%  { opacity: 1; filter: blur(0px); }
    100% { opacity: 1; transform: scale(1.0); filter: blur(0px); }
  }

  .glass {
    position: absolute; inset: 0;
    border-radius: 50%;
    pointer-events: none;
    background:
      radial-gradient(circle at 30% 28%,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.08) 14%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.55) 100%);
    mix-blend-mode: screen;
  }
  .glass::after {
    content: '';
    position: absolute;
    left: 22%; top: 18%;
    width: 24%; height: 11%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.55), transparent 70%);
    transform: rotate(-22deg);
    filter: blur(2px);
  }
  .glow {
    position: absolute; inset: 0;
    border-radius: 50%;
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% {
      box-shadow:
        0 0 60px var(--glow-mid, rgba(72,202,228,0.55)),
        inset 0 0 60px var(--glow-soft, rgba(72,202,228,0.25));
    }
    50% {
      box-shadow:
        0 0 110px var(--glow-strong, rgba(72,202,228,0.85)),
        inset 0 0 100px var(--glow-mid, rgba(72,202,228,0.45));
    }
  }
  .outer-glow {
    position: absolute; inset: -25%;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle,
      var(--glow-faint, rgba(72,202,228,0.08)) 0%,
      transparent 60%);
    animation: drift 9s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: scale(1) translate(0, 0); opacity: .9; }
    50% { transform: scale(1.06) translate(1%, -1%); opacity: 1; }
  }

  /* Smoke canvas (full viewport overlay) */
  .smoke {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 3; /* above ball so smoke can occlude */
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    left: 0; top: 0;
    width: 32px; height: 32px;
    margin-left: -16px; margin-top: -16px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2147483647;
    transform: translate(var(--cx, 50vw), var(--cy, 50vh));
    transition: opacity .2s ease;
    will-change: transform;
  }
  .cursor::before {
    content: '';
    position: absolute; inset: 12px;
    border-radius: 50%;
    background: var(--glow-strong, #48cae4);
    box-shadow: 0 0 12px var(--glow-strong, #48cae4),
                0 0 32px var(--glow-mid, rgba(72,202,228,0.55));
    transition: inset .2s ease, transform .2s ease;
  }
  .cursor::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid var(--glow-soft, rgba(72,202,228,0.4));
    transition: transform .2s ease, opacity .2s ease;
  }
  .cursor.over-ball::after { transform: scale(1.4); }
  .cursor.over-ball::before { inset: 9px; }
  .cursor.grabbing::before { inset: 14px; }
  .cursor.grabbing::after { opacity: 0; }

  .hint {
    position: fixed;
    left: 50%; bottom: 8vh;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    user-select: none; pointer-events: none;
    opacity: 0;
    animation: hintIn 2.2s ease-out 1.4s forwards;
  }
  @keyframes hintIn { to { opacity: .8; } }
  .hint.fade { animation: hintOut .4s ease forwards; }
  @keyframes hintOut { to { opacity: 0; transform: translate(-50%, 8px); } }

  .hud {
    position: fixed;
    left: 20px; bottom: 20px;
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.55);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    user-select: none; pointer-events: none;
    z-index: 4;
  }
  .hud .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--glow-mid, #48cae4);
    box-shadow: 0 0 10px var(--glow-mid, #48cae4);
    animation: blink 4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  .vision-name {
    position: fixed;
    right: 20px; bottom: 20px;
    color: rgba(255,255,255,0.45);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    user-select: none; pointer-events: none;
    transition: opacity .6s ease;
    z-index: 4;
  }
  .vision-name .sep { opacity: 0.3; margin: 0 8px; }
  .vision-name.hidden { opacity: 0; }

  .filter-svg { position: absolute; width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<svg class="filter-svg" aria-hidden="true">
  <defs>
    <filter id="fisheye" x="0%" y="0%" width="100%" height="100%">
      <feImage xlink:href="#displaceMap" result="map" x="0" y="0" width="100%" height="100%" preserveAspectRatio="none"/>
      <feDisplacementMap in="SourceGraphic" in2="map" scale="80" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="dispR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgb(128,128,128)"/>
      <stop offset="50%" stop-color="rgb(160,160,128)"/>
      <stop offset="100%" stop-color="rgb(220,220,128)"/>
    </radialGradient>
    <symbol id="displaceMap" viewBox="0 0 100 100" preserveAspectRatio="none">
      <rect width="100" height="100" fill="url(#dispR)"/>
    </symbol>
  </defs>
</svg>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="visions.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { GENERATORS, generateVision } = window.Visions;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "glowColor": "#48CAE4",
  "generator": "smoke",
  "barrelDistortion": true,
  "showCaption": true,
  "smokeDensity": 1.0,
  "trailLength": 0.6
}/*EDITMODE-END*/;

function withAlpha(hex, a) {
  const m = hex.replace('#', '');
  const r = parseInt(m.slice(0,2),16), g = parseInt(m.slice(2,4),16), b = parseInt(m.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function hexToRgb(h) {
  const m = h.replace('#', '');
  return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)];
}

function OracleApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tRef = useRef(t); useEffect(() => { tRef.current = t; }, [t]);

  const [currentVision, setCurrentVision] = useState(() =>
    generateVision({ size: 900, generatorId: TWEAK_DEFAULTS.generator !== 'random' ? TWEAK_DEFAULTS.generator : null })
  );
  // ball vision opacity — fades down while user drags smoke out
  const [ballOpacity, setBallOpacity] = useState(1);
  const [phase, setPhase] = useState('idle'); // idle | dragging | settling
  const [hintFading, setHintFading] = useState(false);
  const [hasInteracted, setHasInteracted] = useState(false);

  const ballClipRef = useRef(null);
  const ballWrapRef = useRef(null);
  const smokeRef = useRef(null);
  const cursorRef = useRef(null);

  // mount current vision canvas into ball
  useEffect(() => {
    const clip = ballClipRef.current;
    if (!clip || !currentVision) return;
    const c = currentVision.canvas;
    if (c.parentNode !== clip) {
      // remove any old vision
      clip.querySelectorAll('canvas.vision').forEach(n => n.remove());
      c.classList.add('vision', 'crystallize');
      if (!tRef.current.barrelDistortion) c.classList.add('no-distort');
      clip.appendChild(c);
      // remove crystallize class after animation so subsequent opacity changes work
      setTimeout(() => c.classList.remove('crystallize'), 1700);
    }
    // toggle distort
    c.classList.toggle('no-distort', !tRef.current.barrelDistortion);
  }, [currentVision]);

  // ball opacity
  useEffect(() => {
    const c = currentVision?.canvas;
    if (!c) return;
    c.style.opacity = ballOpacity;
  }, [ballOpacity, currentVision]);

  // distortion toggle live
  useEffect(() => {
    const c = currentVision?.canvas;
    if (!c) return;
    c.classList.toggle('no-distort', !t.barrelDistortion);
  }, [t.barrelDistortion, currentVision]);

  // glow CSS vars
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--glow-mid',    withAlpha(t.glowColor, 0.55));
    root.style.setProperty('--glow-soft',   withAlpha(t.glowColor, 0.25));
    root.style.setProperty('--glow-strong', withAlpha(t.glowColor, 0.85));
    root.style.setProperty('--glow-faint',  withAlpha(t.glowColor, 0.08));
  }, [t.glowColor]);

  // resize smoke canvas
  useEffect(() => {
    function resize() {
      const c = smokeRef.current; if (!c) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      c.width  = window.innerWidth * dpr;
      c.height = window.innerHeight * dpr;
      c.style.width  = window.innerWidth + 'px';
      c.style.height = window.innerHeight + 'px';
      const ctx = c.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, []);

  // shared mutable runtime state for the rAF loop
  const stateRef = useRef({
    mx: window.innerWidth / 2, my: window.innerHeight / 2,
    cx: window.innerWidth / 2, cy: window.innerHeight / 2,
    overBall: false,
    pressing: false,
    particles: [],
    fillOpacity: 0,  // backdrop tint that builds on release
    fillColor: [120,120,140],
  });

  const pointInBall = useCallback((x, y) => {
    const el = ballWrapRef.current; if (!el) return false;
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const dx = x - cx, dy = y - cy;
    return Math.hypot(dx, dy) <= r.width / 2;
  }, []);

  // ── mouse / touch ───────────────────────────────────────────────────────
  useEffect(() => {
    function onMove(e) {
      stateRef.current.mx = e.clientX;
      stateRef.current.my = e.clientY;
      stateRef.current.overBall = pointInBall(e.clientX, e.clientY);
    }
    function onDown(e) {
      if (e.target.closest('.twk-panel')) return;
      if (!pointInBall(e.clientX, e.clientY)) return;
      if (!currentVision || phase !== 'idle') return;
      stateRef.current.mx = e.clientX;
      stateRef.current.my = e.clientY;
      stateRef.current.pressing = true;
      setPhase('dragging');
      setHasInteracted(true);
    }
    function onUp() {
      if (!stateRef.current.pressing) return;
      stateRef.current.pressing = false;
      if (phase !== 'dragging') return;
      releaseSmoke();
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup', onUp);
    };
  }, [pointInBall, currentVision, phase]);

  useEffect(() => {
    function onTouchStart(e) {
      const t0 = e.touches[0]; if (!t0) return;
      stateRef.current.mx = t0.clientX; stateRef.current.my = t0.clientY;
      if (!pointInBall(t0.clientX, t0.clientY) || !currentVision || phase !== 'idle') return;
      stateRef.current.pressing = true;
      setPhase('dragging');
      setHasInteracted(true);
      e.preventDefault();
    }
    function onTouchMove(e) {
      const t0 = e.touches[0]; if (!t0) return;
      stateRef.current.mx = t0.clientX; stateRef.current.my = t0.clientY;
      stateRef.current.overBall = pointInBall(t0.clientX, t0.clientY);
    }
    function onTouchEnd() {
      if (!stateRef.current.pressing) return;
      stateRef.current.pressing = false;
      if (phase !== 'dragging') return;
      releaseSmoke();
    }
    window.addEventListener('touchstart', onTouchStart, { passive: false });
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    window.addEventListener('touchend', onTouchEnd);
    return () => {
      window.removeEventListener('touchstart', onTouchStart);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onTouchEnd);
    };
  }, [pointInBall, currentVision, phase]);

  // ── release: stop emission, big puff, fill screen, schedule new vision ─
  const releaseSmoke = useCallback(() => {
    const s = stateRef.current;
    const cfg = tRef.current;
    setPhase('settling');
    // burst — many slow particles from the current cursor outward in all dirs,
    // sized to fill the screen quickly via growth
    const palette = currentVision ? currentVision.palette : ['#222','#888','#aaa'];
    const colors = palette.slice(1).map(hexToRgb);
    // capture a dominant color for the backdrop tint
    s.fillColor = colors[Math.floor(colors.length / 2)] || s.fillColor;
    const burst = Math.floor(120 * cfg.smokeDensity);
    for (let i = 0; i < burst; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 1.5 + Math.random() * 4.5;
      const c = colors[Math.floor(Math.random() * colors.length)];
      s.particles.push({
        x: s.cx + (Math.random() - 0.5) * 30,
        y: s.cy + (Math.random() - 0.5) * 30,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 0.4, // bias upward
        size: 28 + Math.random() * 38,
        growth: 1.4 + Math.random() * 1.5,
        life: 1.0,
        decay: 0.0045 + Math.random() * 0.006,
        r: c[0], g: c[1], b: c[2],
        curl: (Math.random() - 0.5) * 0.06,
      });
    }
    // backdrop fill builds up to ~0.55 over ~600ms (visible "fills the bg")
    let start = performance.now();
    function rampFill(now) {
      const k = Math.min(1, (now - start) / 700);
      s.fillOpacity = Math.max(s.fillOpacity, 0.55 * k);
      if (k < 1 && stateRef.current.particles.length) requestAnimationFrame(rampFill);
    }
    requestAnimationFrame(rampFill);

    // fade ball vision out fully
    setBallOpacity(0);

    // 1s after release: new vision in ball
    setTimeout(() => {
      const gid = tRef.current.generator === 'random' ? null : tRef.current.generator;
      setCurrentVision(generateVision({ size: 900, generatorId: gid }));
      setBallOpacity(1);
    }, 1000);
    // ~2s: settled
    setTimeout(() => {
      setPhase('idle');
      // backdrop fill fades back to 0 (handled by rAF loop watching phase)
    }, 2200);
  }, [currentVision]);

  // dismiss hint
  useEffect(() => {
    if (hasInteracted && !hintFading) setHintFading(true);
  }, [hasInteracted, hintFading]);

  // ── rAF loop ────────────────────────────────────────────────────────────
  useEffect(() => {
    let rafId;
    let lastT = performance.now();
    let emitAccum = 0;
    function tick(now) {
      const s = stateRef.current;
      const cfg = tRef.current;
      const dt = Math.min(48, now - lastT); lastT = now;

      // smooth cursor
      s.cx += (s.mx - s.cx) * 0.42;
      s.cy += (s.my - s.cy) * 0.42;

      // ball center / radius from DOM
      const ballEl = ballWrapRef.current;
      let bx = window.innerWidth / 2, by = window.innerHeight / 2, br = 200;
      if (ballEl) {
        const r = ballEl.getBoundingClientRect();
        bx = r.left + r.width / 2; by = r.top + r.height / 2; br = r.width / 2;
      }

      // cursor element
      if (cursorRef.current) {
        cursorRef.current.style.setProperty('--cx', s.cx + 'px');
        cursorRef.current.style.setProperty('--cy', s.cy + 'px');
        cursorRef.current.classList.toggle('over-ball', s.overBall && phase === 'idle');
        cursorRef.current.classList.toggle('grabbing', phase === 'dragging');
      }

      // ── smoke emission while dragging ──
      if (phase === 'dragging' && currentVision) {
        const palette = currentVision.palette.slice(1);
        const dx = s.cx - bx, dy = s.cy - by;
        const distFromBall = Math.hypot(dx, dy);
        // emission origin = ball edge in the direction of cursor (slightly inside)
        const norm = Math.max(distFromBall, 1);
        const ox = bx + (dx / norm) * br * 0.85;
        const oy = by + (dy / norm) * br * 0.85;
        // distance from edge to cursor (positive once cursor is outside ball)
        const beyond = Math.max(0, distFromBall - br);
        // emit rate scales with how far past edge user has pulled and a base rate
        emitAccum += (1.5 + beyond * 0.03) * cfg.smokeDensity * (dt / 16);
        while (emitAccum > 1) {
          emitAccum -= 1;
          const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.55;
          const targetDist = Math.max(beyond, 30) * cfg.trailLength;
          // velocity carries the puff from the ball edge toward / past the cursor
          const sp = 1.5 + Math.random() * 2.8 + targetDist * 0.015;
          const c = hexToRgb(palette[Math.floor(Math.random() * palette.length)]);
          s.particles.push({
            x: ox + (Math.random() - 0.5) * br * 0.25,
            y: oy + (Math.random() - 0.5) * br * 0.25,
            vx: Math.cos(ang) * sp,
            vy: Math.sin(ang) * sp,
            size: 10 + Math.random() * 16,
            growth: 0.4 + Math.random() * 0.8,
            life: 1.0,
            decay: 0.011 + Math.random() * 0.012,
            r: c[0], g: c[1], b: c[2],
            curl: (Math.random() - 0.5) * 0.08,
          });
        }
        // ball vision dims a bit while pulling smoke out
        const targetOpacity = Math.max(0.25, 1 - beyond / (br * 1.5));
        // direct DOM update (don't re-render every frame)
        const c = currentVision.canvas;
        if (c) c.style.opacity = String(targetOpacity);
      }

      // ── physics ──
      const ps = s.particles;
      for (let i = ps.length - 1; i >= 0; i--) {
        const p = ps[i];
        // turbulence
        p.vx += (Math.random() - 0.5) * 0.12 + p.curl * Math.sin(now * 0.001 + i);
        p.vy += (Math.random() - 0.5) * 0.12 - 0.04; // buoyancy
        p.vx *= 0.965; p.vy *= 0.965;
        p.x += p.vx; p.y += p.vy;
        p.size += p.growth;
        p.life -= p.decay;
        if (p.life <= 0 || p.size > 380) { ps.splice(i, 1); continue; }
      }

      // ── render ──
      const sc = smokeRef.current;
      if (sc) {
        const w = window.innerWidth, h = window.innerHeight;
        const ctx = sc.getContext('2d');
        ctx.clearRect(0, 0, w, h);

        // backdrop fill that builds when smoke is filling the screen
        if (s.fillOpacity > 0.001) {
          const fc = s.fillColor;
          // radial gradient from edges inward so the ball remains slightly visible
          const grad = ctx.createRadialGradient(bx, by, br * 0.4, bx, by, Math.max(w, h));
          grad.addColorStop(0, `rgba(${fc[0]},${fc[1]},${fc[2]},${s.fillOpacity * 0.45})`);
          grad.addColorStop(1, `rgba(${fc[0]},${fc[1]},${fc[2]},${s.fillOpacity})`);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);
        }
        // when settling, fade backdrop out
        if (phase !== 'dragging') {
          s.fillOpacity *= 0.985;
        }

        // soft additive smoke
        ctx.globalCompositeOperation = 'screen';
        for (const p of ps) {
          const a = Math.max(0, p.life);
          const r = p.size;
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
          g.addColorStop(0,   `rgba(${p.r},${p.g},${p.b},${a * 0.45})`);
          g.addColorStop(0.5, `rgba(${p.r},${p.g},${p.b},${a * 0.18})`);
          g.addColorStop(1,   `rgba(${p.r},${p.g},${p.b},0)`);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
      }

      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafId);
  }, [phase, currentVision]);

  return (
    <div className="stage">
      <div className="outer-glow" />

      <div className="ball-wrap" ref={ballWrapRef}>
        <div className="ball-clip" ref={ballClipRef} />
        <div className="glass" />
        <div className="glow" />
      </div>

      <canvas className="smoke" ref={smokeRef} />

      <div className="cursor" ref={cursorRef} />

      <div className="hud">
        <span className="dot" />
        <span>The Oracle</span>
      </div>

      {t.showCaption && currentVision && phase === 'idle' && (
        <div className="vision-name">
          <span>{currentVision.generator.name}</span>
          <span className="sep">·</span>
          <span>#{currentVision.seed.toString(16).slice(0,6).padStart(6,'0')}</span>
        </div>
      )}

      {!hasInteracted && (
        <div className={`hint ${hintFading ? 'fade' : ''}`}>
          Pull the smoke out of the ball
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Visions" />
        <TweakSelect
          label="Source"
          value={t.generator}
          options={['random', ...GENERATORS.map(g => g.id)]}
          onChange={(v) => setTweak('generator', v)}
        />
        <TweakToggle
          label="Fish-eye distortion"
          value={t.barrelDistortion}
          onChange={(v) => setTweak('barrelDistortion', v)}
        />
        <TweakToggle
          label="Show caption"
          value={t.showCaption}
          onChange={(v) => setTweak('showCaption', v)}
        />
        <TweakSection label="Smoke" />
        <TweakSlider
          label="Density"
          value={t.smokeDensity}
          min={0.3} max={2.5} step={0.1}
          onChange={(v) => setTweak('smokeDensity', v)}
        />
        <TweakSlider
          label="Trail length"
          value={t.trailLength}
          min={0.2} max={1.8} step={0.1}
          onChange={(v) => setTweak('trailLength', v)}
        />
        <TweakSection label="Glow" />
        <TweakColor
          label="Color"
          value={t.glowColor}
          options={['#48CAE4', '#FFFFFF', '#FFB347', '#FF4D9F', '#9F6DFF', '#62FF8A']}
          onChange={(v) => setTweak('glowColor', v)}
        />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<OracleApp />);
</script>

</body>
</html>
